# Daily stock-data refresh for the picker app (picker/).
#
# Fail-soft by construction: the commit step only runs after the screener
# AND validate_data.py AND the data-shape tests all pass, so a bad or
# rate-limited scrape can never replace the last good snapshot — the site
# simply keeps serving yesterday's data.
name: Update stock data

on:
  schedule:
    # 22:30 UTC ≈ 5:30–6:30pm ET, after the US close, weekdays only.
    - cron: '30 22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: picker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: picker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener (writes portfolio_data.json + prices.json)
        run: python screener.py

      - name: Validate fresh data
        run: python validate_data.py

      - name: Run data-shape tests
        run: python tests/test_app.py

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add portfolio_data.json prices.json
          if git diff --cached --quiet; then
            echo 'No data changes today.'
            exit 0
          fi
          git commit -m "data: daily refresh $(date -u +%F)"
          git push
