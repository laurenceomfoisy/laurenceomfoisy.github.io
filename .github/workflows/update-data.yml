# Daily stock-data refresh for the picker app (picker/).
#
# Fail-soft by construction: the commit step only runs after the screener
# AND validate_data.py AND the data-shape tests all pass, so a bad or
# rate-limited scrape can never replace the last good snapshot — the site
# simply keeps serving yesterday's data.
name: Update stock data

on:
  schedule:
    # 22:30 UTC ≈ 5:30–6:30pm ET, after the US close, weekdays only.
    - cron: '30 22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write  # rerun flaky pages-build-deployment runs

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: picker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: picker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener (writes portfolio_data.json + prices.json)
        run: python screener.py

      - name: Validate fresh data
        run: python validate_data.py

      - name: Run data-shape tests
        run: python tests/test_app.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add portfolio_data.json prices.json
          if git diff --cached --quiet; then
            echo 'No data changes today.'
            exit 0
          fi
          git commit -m "data: daily refresh $(date -u +%F)"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Ensure Pages deploys the fresh data
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The data push triggers GitHub's own pages-build-deployment
          # workflow, which fails transiently often enough to matter
          # ("Deployment failed, try again later" during syncing_files —
          # 3 of 4 deploys on 2026-07-04). A failed deploy never retries
          # itself and would silently leave the site a day stale, so poll
          # it and rerun the failed attempt up to twice.
          sleep 30
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow pages-build-deployment --limit 1 --json databaseId -q '.[0].databaseId')
          for attempt in 1 2 3; do
            for i in $(seq 1 40); do
              status=$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json status -q .status)
              [ "$status" = "completed" ] && break
              sleep 15
            done
            conclusion=$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json conclusion -q .conclusion)
            echo "pages-build-deployment attempt $attempt: $conclusion"
            if [ "$conclusion" = "success" ]; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              echo "Pages deploy still failing after 2 reruns — site serves the previous data."
              exit 1
            fi
            gh run rerun "$run_id" --repo "$GITHUB_REPOSITORY" --failed
            sleep 20
          done
