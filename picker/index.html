<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <script>
        // Cloudflare fronts this domain without "Always Use HTTPS", and
        // GitHub Pages can't provision its cert behind the proxy — so
        // enforce HTTPS here until the Cloudflare setting is flipped.
        if (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            location.replace('https:' + location.href.substring(5));
        }
    </script>
